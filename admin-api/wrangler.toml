name = "sms-chatbot-admin-api"
main = "admin-api.js"
compatibility_date = "2024-01-01"

[observability.logs]
enabled = true

# Bind to the SAME D1 database as your main sms-chatbot worker
[[d1_databases]]
binding = "DB"
database_name = "sms-chatbot-db"
database_id = "ac43486d-87fc-4f9b-a8a6-5f45b7da25f6"

# Secrets (set via: wrangler secret put ADMIN_SECRET)
# ADMIN_SECRET   — the dashboard password (you choose)
# TELNYX_API_KEY — same as your main worker
# TELNYX_PHONE_NUMBER — same as your main worker
