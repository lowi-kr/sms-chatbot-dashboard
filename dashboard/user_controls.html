<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SMS CORE — User Control</title>
<style>body { visibility: hidden; }</style>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: { extend: {
      colors: {
        bg:'#060c1a', surface:'#0d1628', border:'#1e2d4a',
        accent:'#4f7cff', text:'#c8d8f8', muted:'#4a5980', success:'#22d3a5', error:'#ff5f7e',
      },
      fontFamily: { mono:['JetBrains Mono','monospace'], sans:['Inter','sans-serif'], display:['Space Grotesk','sans-serif'] }
    }}
  }
</script>
<style>
  * { box-sizing: border-box; }
  body { background: #060c1a; color: #c8d8f8; font-family: 'Inter', sans-serif; margin: 0; }
  .msym { font-family: 'Material Symbols Outlined'; font-variation-settings: 'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24; line-height:1; vertical-align:middle; }
  ::-webkit-scrollbar{width:6px;height:6px} ::-webkit-scrollbar-track{background:#060c1a} ::-webkit-scrollbar-thumb{background:#1e2d4a;border-radius:3px}
  .sidebar { width:240px; background:#090f1e; border-right:1px solid #1e2d4a; display:flex; flex-direction:column; position:fixed; top:0; left:0; height:100vh; z-index:100; }
  .nav-item { display:flex; align-items:center; gap:10px; padding:10px 16px; color:#4a5980; font-size:14px; font-weight:500; cursor:pointer; border-left:2px solid transparent; transition:all 0.15s; text-decoration:none; }
  .nav-item:hover { color:#c8d8f8; background:rgba(79,124,255,0.05); }
  .nav-item.active { color:#4f7cff; background:rgba(79,124,255,0.1); border-left-color:#4f7cff; }
  .main { margin-left:240px; min-height:100vh; }
  .topbar { height:56px; background:#090f1e; border-bottom:1px solid #1e2d4a; display:flex; align-items:center; padding:0 24px; gap:16px; position:sticky; top:0; z-index:50; }
  .card { background:#0d1628; border:1px solid #1e2d4a; border-radius:12px; overflow:hidden; }
  .btn { display:inline-flex; align-items:center; gap:6px; padding:7px 14px; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; border:none; transition:all 0.15s; }
  .btn-ghost { background:transparent; color:#4a5980; border:1px solid #1e2d4a; }
  .btn-ghost:hover { color:#c8d8f8; border-color:#2d3f60; }
  .btn-accent { background:#4f7cff; color:white; }
  .btn-accent:hover { background:#6b93ff; }
  .btn-danger { background:rgba(255,95,126,0.12); color:#ff5f7e; border:1px solid rgba(255,95,126,0.2); }
  .btn-danger:hover { background:rgba(255,95,126,0.22); }
  .btn-success { background:rgba(34,211,165,0.12); color:#22d3a5; border:1px solid rgba(34,211,165,0.2); }
  .btn-success:hover { background:rgba(34,211,165,0.22); }
  .btn-sm { padding:5px 10px; font-size:12px; gap:4px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  thead th { padding:11px 16px; text-align:left; font-size:10px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:#4a5980; background:#090f1e; border-bottom:1px solid #1e2d4a; font-family:'JetBrains Mono',monospace; }
  tbody tr { border-bottom:1px solid #111e35; transition:background 0.1s; }
  tbody tr:hover { background:rgba(79,124,255,0.03); }
  tbody td { padding:12px 16px; vertical-align:middle; }
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.65); backdrop-filter:blur(4px); z-index:200; display:flex; align-items:center; justify-content:center; padding:16px; }
  .modal { background:#0d1628; border:1px solid #1e2d4a; border-radius:16px; padding:28px; width:100%; max-width:440px; box-shadow:0 24px 80px rgba(0,0,0,0.5); }
  .modal-input { width:100%; background:#090f1e; border:1px solid #1e2d4a; color:#c8d8f8; border-radius:8px; padding:10px 14px; font-size:14px; outline:none; transition:border-color 0.2s; font-family:'JetBrains Mono',monospace; }
  .modal-input:focus { border-color:#4f7cff; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .spin { animation:spin 0.8s linear infinite; display:inline-block; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .live-dot { width:7px; height:7px; border-radius:50%; background:#22d3a5; animation:pulse 2s ease-in-out infinite; }
  .stat-mini { background:#0d1628; border:1px solid #1e2d4a; border-radius:10px; padding:16px 20px; display:flex; align-items:center; gap:14px; }
</style>
</head>
<body>
<script src="config.js"></script>
<script src="api.js"></script>
<script>
  if (!requireAuth()) throw new Error('Auth required');
    document.body.style.visibility = 'visible';

<aside class="sidebar">
  <div style="padding:20px 16px;border-bottom:1px solid #1e2d4a;margin-bottom:8px">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:32px;height:32px;background:rgba(79,124,255,0.15);border:1px solid rgba(79,124,255,0.3);border-radius:8px;display:flex;align-items:center;justify-content:center">
        <span class="msym" style="color:#4f7cff;font-size:18px">terminal</span>
      </div>
      <div>
        <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;color:#c8d8f8">SMS CORE</div>
        <div style="font-size:10px;color:#4a5980;font-family:'JetBrains Mono',monospace">v2.4.0</div>
      </div>
    </div>
  </div>
  <nav style="flex:1;padding:4px 8px">
    <a class="nav-item" href="index.html"><span class="msym">forum</span> Message Logs</a>
    <a class="nav-item active" href="user_controls.html"><span class="msym">security</span> User Control</a>
  </nav>
  <div style="padding:12px 16px;border-top:1px solid #1e2d4a">
    <div style="display:flex;align-items:center;gap:8px;padding:8px;border-radius:8px;background:rgba(79,124,255,0.05);border:1px solid #1e2d4a;margin-bottom:8px">
      <div class="live-dot"></div>
      <div style="font-size:11px;font-family:'JetBrains Mono',monospace;color:#4a5980">TELNYX ONLINE</div>
    </div>
    <button onclick="api.logout()" class="nav-item" style="width:100%;background:none;border:none;text-align:left;border-radius:6px;color:#4a5980">
      <span class="msym">logout</span> Sign Out
    </button>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div style="flex:1">
      <h1 style="font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:600;margin:0">User Control</h1>
      <p style="font-size:12px;color:#4a5980;margin:0">Manage access control — whitelist & blacklist</p>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="loadAll()" id="refresh-btn">
      <span class="msym" id="refresh-icon">refresh</span> Refresh
    </button>
  </div>

  <div style="padding:24px;display:flex;flex-direction:column;gap:20px">

    <!-- Stats mini row -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px" id="mini-stats">
      <div class="stat-mini"><span class="msym" style="color:#ff5f7e;font-size:22px">block</span><div><div style="font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;color:#ff5f7e" id="bl-count">—</div><div style="font-size:11px;color:#4a5980">Blacklisted</div></div></div>
      <div class="stat-mini"><span class="msym" style="color:#4f7cff;font-size:22px">verified</span><div><div style="font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;color:#4f7cff" id="wl-count">—</div><div style="font-size:11px;color:#4a5980">Whitelisted</div></div></div>
      <div class="stat-mini" style="border-color:rgba(255,191,36,0.2);background:rgba(251,191,36,0.04)">
        <span class="msym" style="color:#fbbf24;font-size:22px">info</span>
        <div style="font-size:12px;color:#fbbf24;line-height:1.5">
          <strong>Whitelist mode:</strong> if any entries exist, <em>only</em> those numbers can use the bot.
        </div>
      </div>
    </div>

    <!-- Split tables -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">

      <!-- Blacklist -->
      <div class="card">
        <div style="padding:14px 18px;border-bottom:1px solid #1e2d4a;display:flex;align-items:center;gap:10px">
          <span class="msym" style="color:#ff5f7e">block</span>
          <h2 style="font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;margin:0;flex:1">Blacklist</h2>
          <span style="font-size:10px;font-family:'JetBrains Mono',monospace;background:rgba(255,95,126,0.12);color:#ff5f7e;padding:3px 8px;border-radius:999px;border:1px solid rgba(255,95,126,0.2)">BLOCKED</span>
          <button class="btn btn-danger btn-sm" onclick="openAddModal('blacklist')">
            <span class="msym" style="font-size:16px">add</span> Add
          </button>
        </div>
        <div style="max-height:480px;overflow-y:auto">
          <table>
            <thead><tr>
              <th>Phone Number</th>
              <th>Reason</th>
              <th>Added</th>
              <th style="text-align:center">Remove</th>
            </tr></thead>
            <tbody id="bl-body"><tr><td colspan="4" style="text-align:center;padding:40px;color:#4a5980">Loading...</td></tr></tbody>
          </table>
        </div>
        <div style="padding:10px 16px;border-top:1px solid #1e2d4a">
          <input id="bl-search" placeholder="Search blacklist..." oninput="filterBl()"
            style="width:100%;background:#090f1e;border:1px solid #1e2d4a;color:#c8d8f8;border-radius:6px;padding:7px 12px;font-size:12px;outline:none;font-family:inherit"/>
        </div>
      </div>

      <!-- Whitelist -->
      <div class="card">
        <div style="padding:14px 18px;border-bottom:1px solid #1e2d4a;display:flex;align-items:center;gap:10px">
          <span class="msym" style="color:#4f7cff">verified</span>
          <h2 style="font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;margin:0;flex:1">Whitelist</h2>
          <span style="font-size:10px;font-family:'JetBrains Mono',monospace;background:rgba(79,124,255,0.12);color:#4f7cff;padding:3px 8px;border-radius:999px;border:1px solid rgba(79,124,255,0.2)">PRIORITY</span>
          <button class="btn btn-accent btn-sm" onclick="openAddModal('whitelist')">
            <span class="msym" style="font-size:16px">add</span> Add
          </button>
        </div>
        <div style="max-height:480px;overflow-y:auto">
          <table>
            <thead><tr>
              <th>Phone Number</th>
              <th>Label</th>
              <th>Added</th>
              <th style="text-align:center">Remove</th>
            </tr></thead>
            <tbody id="wl-body"><tr><td colspan="4" style="text-align:center;padding:40px;color:#4a5980">Loading...</td></tr></tbody>
          </table>
        </div>
        <div style="padding:10px 16px;border-top:1px solid #1e2d4a">
          <input id="wl-search" placeholder="Search whitelist..." oninput="filterWl()"
            style="width:100%;background:#090f1e;border:1px solid #1e2d4a;color:#c8d8f8;border-radius:6px;padding:7px 12px;font-size:12px;outline:none;font-family:inherit"/>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Add Entry Modal -->
<div id="add-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeAddModal()">
  <div class="modal">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <h3 id="add-modal-title" style="font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:600;margin:0"></h3>
      <button onclick="closeAddModal()" style="background:none;border:none;color:#4a5980;cursor:pointer"><span class="msym">close</span></button>
    </div>
    <div style="display:flex;flex-direction:column;gap:14px">
      <div>
        <label style="display:block;font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#4a5980;margin-bottom:6px;font-family:'JetBrains Mono',monospace">Phone Number (E.164 format)</label>
        <input id="add-phone" class="modal-input" placeholder="+15551234567" />
      </div>
      <div>
        <label style="display:block;font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#4a5980;margin-bottom:6px;font-family:'JetBrains Mono',monospace" id="add-label-label">Label / Reason</label>
        <input id="add-label" class="modal-input" placeholder="e.g. My personal number" style="font-family:'Inter',sans-serif"/>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:4px">
        <button class="btn btn-ghost" onclick="closeAddModal()">Cancel</button>
        <button class="btn btn-accent" id="add-confirm-btn" onclick="submitAdd()">Add Entry</button>
      </div>
    </div>
  </div>
</div>

<script>
  if (!requireAuth()) throw new Error('Auth required');
  document.body.style.visibility = 'visible';

  let blData = [], wlData = [];
  let addingTo = 'blacklist';

  async function loadAll() {
    const icon = document.getElementById('refresh-icon');
    icon.classList.add('spin');
    try {
      const [bl, wl, stats] = await Promise.all([api.blacklist(), api.whitelist(), api.stats()]);
      blData = bl; wlData = wl;
      document.getElementById('bl-count').textContent = bl.length.toLocaleString();
      document.getElementById('wl-count').textContent = wl.length.toLocaleString();
      renderBl(blData); renderWl(wlData);
    } catch (e) { showToast('Load failed: ' + e.message, 'error'); }
    finally { icon.classList.remove('spin'); }
  }

  function filterBl() {
    const q = document.getElementById('bl-search').value.toLowerCase();
    renderBl(blData.filter(r => r.phone_number.toLowerCase().includes(q) || (r.reason||'').toLowerCase().includes(q)));
  }

  function filterWl() {
    const q = document.getElementById('wl-search').value.toLowerCase();
    renderWl(wlData.filter(r => r.phone_number.toLowerCase().includes(q) || (r.label||'').toLowerCase().includes(q)));
  }

  function renderBl(rows) {
    const tbody = document.getElementById('bl-body');
    if (!rows.length) { tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:32px;color:#4a5980">No entries</td></tr>`; return; }
    tbody.innerHTML = rows.map(r => `
      <tr>
        <td><span style="font-family:'JetBrains Mono',monospace;color:#ff5f7e;font-size:12px">${r.phone_number}</span></td>
        <td style="color:#4a5980;font-size:12px">${r.reason || '—'}</td>
        <td style="color:#4a5980;font-size:11px;font-family:'JetBrains Mono',monospace">${fmtDate(r.created_at)}</td>
        <td style="text-align:center">
          <button class="btn btn-success btn-sm" onclick="removeBlacklist('${r.phone_number}')">
            <span class="msym" style="font-size:14px">lock_open</span> Unblock
          </button>
        </td>
      </tr>`).join('');
  }

  function renderWl(rows) {
    const tbody = document.getElementById('wl-body');
    if (!rows.length) { tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:32px;color:#4a5980">No entries — all numbers allowed</td></tr>`; return; }
    tbody.innerHTML = rows.map(r => `
      <tr>
        <td><span style="font-family:'JetBrains Mono',monospace;color:#4f7cff;font-size:12px">${r.phone_number}</span></td>
        <td style="color:#4a5980;font-size:12px">${r.label || '—'}</td>
        <td style="color:#4a5980;font-size:11px;font-family:'JetBrains Mono',monospace">${fmtDate(r.created_at)}</td>
        <td style="text-align:center">
          <button class="btn btn-danger btn-sm" onclick="removeWhitelist('${r.phone_number}')">
            <span class="msym" style="font-size:14px">person_remove</span> Remove
          </button>
        </td>
      </tr>`).join('');
  }

  // Add modal
  function openAddModal(list) {
    addingTo = list;
    document.getElementById('add-modal-title').textContent = list === 'blacklist' ? '🚫 Add to Blacklist' : '✅ Add to Whitelist';
    document.getElementById('add-label-label').textContent = list === 'blacklist' ? 'Reason (optional)' : 'Label (optional)';
    document.getElementById('add-phone').value = '';
    document.getElementById('add-label').value = '';
    document.getElementById('add-modal').style.display = 'flex';
    setTimeout(() => document.getElementById('add-phone').focus(), 50);
  }

  function closeAddModal() { document.getElementById('add-modal').style.display = 'none'; }

  async function submitAdd() {
    const phone = document.getElementById('add-phone').value.trim();
    const label = document.getElementById('add-label').value.trim();
    if (!phone) { showToast('Enter a phone number', 'error'); return; }
    const btn = document.getElementById('add-confirm-btn');
    btn.disabled = true; btn.textContent = 'Adding...';
    try {
      if (addingTo === 'blacklist') await api.addBlacklist(phone, label);
      else await api.addWhitelist(phone, label);
      showToast(`Added to ${addingTo}`, 'success');
      closeAddModal();
      loadAll();
    } catch (e) { showToast('Failed: ' + e.message, 'error'); }
    finally { btn.disabled = false; btn.textContent = 'Add Entry'; }
  }

  async function removeBlacklist(phone) {
    showConfirm(`Remove <strong style="color:#ff5f7e;font-family:'JetBrains Mono',monospace">${phone}</strong> from blacklist?`, async () => {
      try { await api.removeBlacklist(phone); showToast('Removed from blacklist', 'success'); loadAll(); }
      catch (e) { showToast('Failed: ' + e.message, 'error'); }
    });
  }

  async function removeWhitelist(phone) {
    showConfirm(`Remove <strong style="color:#4f7cff;font-family:'JetBrains Mono',monospace">${phone}</strong> from whitelist?`, async () => {
      try { await api.removeWhitelist(phone); showToast('Removed from whitelist', 'success'); loadAll(); }
      catch (e) { showToast('Failed: ' + e.message, 'error'); }
    });
  }

  function fmtDate(dt) {
    if (!dt) return '—';
    return new Date(dt + 'Z').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  // Enter key in add modal
  document.getElementById('add-label').addEventListener('keydown', e => { if (e.key === 'Enter') submitAdd(); });
  document.getElementById('add-phone').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('add-label').focus(); });

  loadAll();
</script>
</body>
</html>
