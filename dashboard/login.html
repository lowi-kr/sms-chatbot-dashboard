<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SMS CORE — Secure Access</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: { extend: {
      colors: {
        bg: '#060c1a', surface: '#0d1628', border: '#1e2d4a',
        accent: '#4f7cff', 'accent-dim': '#1e2d4a', text: '#c8d8f8',
        muted: '#4a5980', success: '#22d3a5', error: '#ff5f7e',
      },
      fontFamily: { mono: ['JetBrains Mono', 'monospace'], sans: ['Inter', 'sans-serif'], display: ['Space Grotesk', 'sans-serif'] }
    }}
  }
</script>
<style>
  body { background-color: #060c1a; font-family: 'Inter', sans-serif; }
  .msym { font-family: 'Material Symbols Outlined'; font-variation-settings: 'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24; }
  .grid-bg {
    background-image: linear-gradient(rgba(79,124,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,124,255,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
  }
  .glow { box-shadow: 0 0 40px rgba(79,124,255,0.15), 0 0 80px rgba(79,124,255,0.05); }
  .input-field {
    background: #0a1220; border: 1px solid #1e2d4a; color: #c8d8f8;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-field:focus { outline: none; border-color: #4f7cff; box-shadow: 0 0 0 3px rgba(79,124,255,0.12); }
  .btn-primary {
    background: #4f7cff; color: white; font-weight: 600; letter-spacing: 0.02em;
    transition: all 0.2s; position: relative; overflow: hidden;
  }
  .btn-primary:hover { background: #6b93ff; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(79,124,255,0.3); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary.loading { pointer-events: none; opacity: 0.7; }
  @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .pulse { animation: pulse-dot 1.5s ease-in-out infinite; }
  @keyframes slide-up { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  .slide-up { animation: slide-up 0.5s ease forwards; }
  .shake { animation: shake 0.4s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }
  .scan-line {
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, #4f7cff, transparent);
    animation: scan 3s ease-in-out infinite;
  }
  @keyframes scan { 0%,100%{top:0;opacity:0} 10%{opacity:1} 90%{opacity:1} to{top:100%} }
</style>
</head>
<body class="grid-bg min-h-screen flex items-center justify-center p-4">

<!-- Corner decorations -->
<div class="fixed top-0 left-0 w-32 h-32 border-l-2 border-t-2 border-accent/20 pointer-events-none"></div>
<div class="fixed top-0 right-0 w-32 h-32 border-r-2 border-t-2 border-accent/20 pointer-events-none"></div>
<div class="fixed bottom-0 left-0 w-32 h-32 border-l-2 border-b-2 border-accent/20 pointer-events-none"></div>
<div class="fixed bottom-0 right-0 w-32 h-32 border-r-2 border-b-2 border-accent/20 pointer-events-none"></div>

<!-- Status bar top -->
<div class="fixed top-4 left-1/2 -translate-x-1/2 flex items-center gap-6 text-xs font-mono text-muted">
  <span class="flex items-center gap-2"><span class="w-1.5 h-1.5 rounded-full bg-success pulse"></span>NODE_01 ACTIVE</span>
  <span class="text-border">|</span>
  <span id="clock" class="text-muted/60"></span>
  <span class="text-border">|</span>
  <span class="flex items-center gap-2"><span class="w-1.5 h-1.5 rounded-full bg-accent pulse" style="animation-delay:0.5s"></span>TLS 1.3</span>
</div>

<!-- Main card -->
<div class="w-full max-w-[420px] slide-up">

  <!-- Logo / header -->
  <div class="text-center mb-10">
    <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl border border-accent/30 bg-accent/5 mb-5 relative glow">
      <span class="msym text-3xl text-accent">terminal</span>
      <span class="absolute -top-1 -right-1 w-3 h-3 rounded-full bg-success border-2 border-bg"></span>
    </div>
    <h1 class="font-display text-3xl font-bold text-text tracking-tight">SMS CORE</h1>
    <p class="text-muted text-sm mt-1 font-mono">v2.4.0 / ADMIN_CONSOLE</p>
  </div>

  <!-- Login card -->
  <div class="bg-surface border border-border rounded-2xl p-8 relative overflow-hidden glow">
    <div class="scan-line"></div>

    <h2 class="font-display text-lg font-semibold text-text mb-1">Operator Authentication</h2>
    <p class="text-muted text-sm mb-7">Enter your access credentials to initialize the session.</p>

    <div id="error-msg" class="hidden mb-5 flex items-center gap-3 bg-error/10 border border-error/30 text-error text-sm rounded-lg px-4 py-3">
      <span class="msym text-lg">error</span>
      <span id="error-text">Invalid credentials.</span>
    </div>

    <div class="space-y-5">
      <div>
        <label class="block text-xs font-mono text-muted uppercase tracking-wider mb-2">Password / API Key</label>
        <div class="relative">
          <span class="msym absolute left-3 top-1/2 -translate-y-1/2 text-muted">key</span>
          <input id="password" type="password" class="input-field w-full pl-10 pr-12 py-3 rounded-lg font-mono text-sm"
            placeholder="••••••••••••••••" autocomplete="current-password"/>
          <button type="button" id="toggle-pw" class="absolute right-3 top-1/2 -translate-y-1/2 text-muted hover:text-text transition-colors">
            <span class="msym text-lg" id="eye-icon">visibility</span>
          </button>
        </div>
      </div>

      <button id="login-btn" onclick="doLogin()" class="btn-primary w-full py-3.5 rounded-lg text-sm flex items-center justify-center gap-2">
        <span class="msym text-lg">lock_open</span>
        <span>Initialize Session</span>
      </button>
    </div>

    <!-- Security note -->
    <div class="mt-6 flex items-center gap-2 text-xs text-muted/60 font-mono">
      <span class="msym text-sm">shield</span>
      <span>Session expires after 24h of inactivity</span>
    </div>
  </div>

  <p class="text-center text-xs text-muted/40 font-mono mt-6">
    Cloudflare Workers + D1 · Telnyx SMS
  </p>
</div>

<script>
  // Clock
  function updateClock() {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-US', { hour12: false });
  }
  updateClock(); setInterval(updateClock, 1000);

  // Password toggle
  document.getElementById('toggle-pw').addEventListener('click', () => {
    const pw = document.getElementById('password');
    const icon = document.getElementById('eye-icon');
    if (pw.type === 'password') { pw.type = 'text'; icon.textContent = 'visibility_off'; }
    else { pw.type = 'password'; icon.textContent = 'visibility'; }
  });

  // Enter key
  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  // Read API URL from config
  const API_URL = window.SMS_CORE_API_URL || '';

  async function doLogin() {
    const password = document.getElementById('password').value.trim();
    const btn = document.getElementById('login-btn');
    const errDiv = document.getElementById('error-msg');
    const errText = document.getElementById('error-text');

    if (!password) { showError('Please enter your password.'); return; }

    btn.classList.add('loading');
    btn.innerHTML = '<span class="msym text-lg animate-spin">refresh</span><span>Authenticating...</span>';
    errDiv.classList.add('hidden');

    try {
      const resp = await fetch(`${API_URL}/api/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password }),
      });

      if (resp.ok) {
        const data = await resp.json();
        // Store token and API URL
        sessionStorage.setItem('sms_token', data.token);
        sessionStorage.setItem('sms_api', API_URL);
        btn.innerHTML = '<span class="msym text-lg">check_circle</span><span>Access Granted</span>';
        btn.style.background = '#22d3a5';
        setTimeout(() => { window.location.href = 'index.html'; }, 600);
      } else {
        showError('Invalid credentials. Access denied.');
      }
    } catch (e) {
      showError('Connection failed. Check API URL in config.js.');
    } finally {
      if (!btn.style.background) {
        btn.classList.remove('loading');
        btn.innerHTML = '<span class="msym text-lg">lock_open</span><span>Initialize Session</span>';
      }
    }
  }

  function showError(msg) {
    const errDiv = document.getElementById('error-msg');
    document.getElementById('error-text').textContent = msg;
    errDiv.classList.remove('hidden');
    document.querySelector('.bg-surface').classList.add('shake');
    setTimeout(() => document.querySelector('.bg-surface').classList.remove('shake'), 400);
  }

  // Redirect if already logged in
  if (sessionStorage.getItem('sms_token')) window.location.href = 'index.html';
</script>
</body>
</html>
