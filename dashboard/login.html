<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SMS CORE — Secure Access</title>
<script src="config.js"></script>
<script src="api.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1e2433; --surface: #252d3d; --surface-hi: #2d3748;
    --border: #3d4a63; --border-hi: #4d5e7a;
    --accent: #5b8af5; --accent-dim: rgba(91,138,245,0.12);
    --text: #e2e8f4; --muted: #7a8ba8; --muted-dim: #4a5870;
    --success: #4a9d72; --error: #e07a7a; --warn: #d4a843;
  }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
  }

  /* Subtle dot grid */
  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none;
    background-image: radial-gradient(circle, rgba(91,138,245,0.07) 1px, transparent 1px);
    background-size: 32px 32px;
  }

  /* Soft glow behind card */
  body::after {
    content: '';
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 600px; height: 400px;
    background: radial-gradient(ellipse, rgba(91,138,245,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 40px;
    width: 100%; max-width: 400px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.35);
    position: relative; z-index: 1;
    animation: fadeUp 0.4s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo {
    width: 48px; height: 48px;
    background: var(--accent-dim);
    border: 1px solid rgba(91,138,245,0.25);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px;
  }

  .msym { font-family: 'Material Symbols Outlined'; font-variation-settings: 'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24; line-height: 1; }

  h1 { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 28px; font-family: 'DM Mono', monospace; }

  .field-label {
    display: block; font-size: 11px; font-weight: 600;
    letter-spacing: 0.07em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 8px; font-family: 'DM Mono', monospace;
  }

  .input-wrap { position: relative; margin-bottom: 20px; }
  .input-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 18px; pointer-events: none; }
  .input-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); cursor: pointer; background: none; border: none; padding: 0; transition: color 0.2s; }
  .input-toggle:hover { color: var(--text); }

  input[type="password"], input[type="text"] {
    width: 100%; padding: 11px 44px;
    background: var(--surface-hi); border: 1px solid var(--border);
    color: var(--text); border-radius: 10px;
    font-size: 14px; font-family: 'DM Mono', monospace;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(91,138,245,0.15); }

  .btn-login {
    width: 100%; padding: 12px;
    background: var(--accent); color: white;
    border: none; border-radius: 10px;
    font-size: 14px; font-weight: 600; font-family: 'DM Sans', sans-serif;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    margin-top: 4px;
  }
  .btn-login:hover { background: #7aa0f7; box-shadow: 0 6px 20px rgba(91,138,245,0.3); transform: translateY(-1px); }
  .btn-login:active { transform: translateY(0); }
  .btn-login:disabled { opacity: 0.6; pointer-events: none; }

  .error-box {
    display: none; align-items: center; gap: 10px;
    background: rgba(224,122,122,0.1); border: 1px solid rgba(224,122,122,0.25);
    color: var(--error); border-radius: 8px; padding: 10px 14px;
    font-size: 13px; margin-bottom: 18px;
  }

  .footer-note {
    margin-top: 20px; text-align: center;
    font-size: 11px; color: var(--muted-dim); font-family: 'DM Mono', monospace;
  }

  @keyframes shake {
    0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)}
    40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)}
  }
  .shake { animation: shake 0.35s ease; }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="logo"><span class="msym" style="color:var(--accent);font-size:22px">terminal</span></div>
  <h1>SMS CORE</h1>
  <p class="subtitle">v2.4.0 · ADMIN_CONSOLE</p>

  <div class="error-box" id="error-box">
    <span class="msym" style="font-size:18px">error</span>
    <span id="error-text">Invalid credentials.</span>
  </div>

  <label class="field-label">Password</label>
  <div class="input-wrap">
    <span class="msym input-icon">key</span>
    <input id="password" type="password" placeholder="••••••••••••••••" autocomplete="current-password"/>
    <button class="input-toggle" id="toggle-pw" type="button">
      <span class="msym" id="eye-icon" style="font-size:18px">visibility</span>
    </button>
  </div>

  <button class="btn-login" id="login-btn" onclick="doLogin()">
    <span class="msym">lock_open</span> Sign In
  </button>

  <p class="footer-note">Cloudflare Workers · D1 · Telnyx</p>
</div>

<script>
  document.getElementById('toggle-pw').addEventListener('click', () => {
    const pw = document.getElementById('password');
    const icon = document.getElementById('eye-icon');
    if (pw.type === 'password') { pw.type = 'text'; icon.textContent = 'visibility_off'; }
    else { pw.type = 'password'; icon.textContent = 'visibility'; }
  });

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  const API_URL = window.SMS_CORE_API_URL || '';

  async function doLogin() {
    const password = document.getElementById('password').value.trim();
    const btn = document.getElementById('login-btn');
    const errBox = document.getElementById('error-box');

    if (!password) { showErr('Please enter your password.'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="msym spin">refresh</span> Signing in...';
    errBox.style.display = 'none';

    try {
      const resp = await fetch(`${API_URL}/api/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password }),
      });

      if (resp.ok) {
        const data = await resp.json();
        sessionStorage.setItem('sms_token', data.token);
        sessionStorage.setItem('sms_api', API_URL);
        btn.innerHTML = '<span class="msym">check_circle</span> Access Granted';
        btn.style.background = '#4a9d72';
        setTimeout(() => { window.location.href = 'index.html'; }, 500);
      } else {
        showErr('Invalid credentials. Access denied.');
      }
    } catch (e) {
      showErr('Connection failed. Check config.js.');
    } finally {
      if (!btn.style.background) {
        btn.disabled = false;
        btn.innerHTML = '<span class="msym">lock_open</span> Sign In';
      }
    }
  }

  function showErr(msg) {
    const box = document.getElementById('error-box');
    document.getElementById('error-text').textContent = msg;
    box.style.display = 'flex';
    document.getElementById('card').classList.add('shake');
    setTimeout(() => document.getElementById('card').classList.remove('shake'), 350);
  }

  if (sessionStorage.getItem('sms_token')) window.location.href = 'index.html';
</script>
</body>
</html>
